<div id="authOverlay" class="overlay" style="display:none">
  <div class="overlay-card">
    <div class="overlay-brand">BC Operations Dashboard</div>
    <h1 id="overlayTitle">Sign in to continue</h1>
    <p class="overlay-sub" id="overlaySub">We'll email you a one-time sign-in link.</p>
    <div class="overlay-form" id="overlayForm">
      <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email" />
      <button id="authSignIn">Send magic link</button>
    </div>
    <p class="overlay-msg" id="overlayMsg"></p>
  </div>
</div>

<div class="wrap" id="upload-wrap">
  <header>
    <h1>BC Operations Dashboard</h1>
    <div class="sub" id="introText">
      Pick periods to compare and click View.
    </div>
  </header>

  <div id="authBar" style="display:none">
    <span id="authStatus"></span>
    <button id="authSignOut" class="secondary">Sign out</button>
    <button id="loadFromStore" class="secondary">Refresh data</button>
    <span id="authHint" class="mode-hint"></span>
  </div>

  <label class="drop drop-all" id="drop-all" style="display:none">
    <h3>Admin — drop new reports here</h3>
    <p>Income Structure · Job Analogue · Hour Statistics · Registration Info</p>
    <p class="sub">Files are classified by their content. Only visible to uploaders.</p>
    <input type="file" accept=".xls,.xlsx" multiple />
  </label>

  <div id="files-summary" style="display:none">
    <h2 style="margin-top:24px" class="admin-only">Files loaded</h2>
    <div class="summary-strip admin-only" id="files-strip"></div>
    <div class="card admin-only" style="margin-top:12px">
      <div id="files-list" class="sub" style="font-size:12px;max-height:160px;overflow-y:auto"></div>
    </div>

    <div id="coverageNote" class="sub" style="margin:18px 0 -4px 0"></div>

    <div id="pickerBar" class="picker-bar">
      <div class="picker-group">
        <span class="picker-label">Current</span>
        <input type="date" id="curFrom" />
        <span class="picker-sep">→</span>
        <input type="date" id="curTo" />
        <select id="curPreset" title="Quick presets">
          <option value="">Quick…</option>
          <option value="last7">Last 7 days</option>
          <option value="last30">Last 30 days</option>
          <option value="lastWeek">Most recent full week</option>
          <option value="lastMonth">Most recent full month</option>
        </select>
      </div>
      <div class="picker-group">
        <span class="picker-label prev">Previous</span>
        <input type="date" id="prevFrom" />
        <span class="picker-sep">→</span>
        <input type="date" id="prevTo" />
        <select id="prevPreset" title="Quick presets">
          <option value="">Quick…</option>
          <option value="priorEqual">Equal range right before current</option>
          <option value="lastWeek-1">Week before current</option>
          <option value="lastMonth-1">Month before current</option>
        </select>
      </div>
      <button id="generate" class="picker-go" disabled>View</button>
      <button id="pushToStore" class="secondary" style="display:none">Push to store</button>
      <button class="secondary admin-only" id="reset">Reset</button>
      <span id="status" class="picker-status"></span>
    </div>
  </div>
</div>
