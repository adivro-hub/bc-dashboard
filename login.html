<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — BC Dashboard</title>
<style>
  html,body{margin:0;padding:0;background:#0b1020;color:#cdd6ee;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh}
  .wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{background:#14193a;border:1px solid #2a3168;border-radius:14px;padding:28px 28px 24px;max-width:420px;width:100%}
  h1{font-size:20px;margin:0 0 4px;color:#fff}
  p{margin:6px 0 18px;color:#9aa6cf;font-size:14px}
  input{width:100%;box-sizing:border-box;padding:11px 12px;font-size:15px;border-radius:8px;border:1px solid #2a3168;background:#0b1020;color:#cdd6ee;outline:none}
  input:focus{border-color:#7c9cff}
  button{margin-top:10px;width:100%;padding:11px 12px;font-size:15px;font-weight:600;border-radius:8px;border:0;background:#3c6cff;color:#fff;cursor:pointer}
  button:disabled{opacity:.5;cursor:default}
  .msg{margin-top:14px;font-size:13px;min-height:18px}
  .ok{color:#82e08e}
  .err{color:#ff9a9a}
  .brand{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7c89c4;margin:0 0 14px}
</style>
</head>
<body>
<div class="wrap"><div class="card">
  <p class="brand">BC Operations Dashboard</p>
  <h1>Sign in</h1>
  <p>We'll email you a one-time sign-in link. The link works for 15 minutes.</p>
  <form id="f" autocomplete="on">
    <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" />
    <button type="submit" id="go">Send magic link</button>
  </form>
  <p class="msg" id="msg"></p>
</div></div>
<script>
  const form = document.getElementById('f');
  const emailEl = document.getElementById('email');
  const btn = document.getElementById('go');
  const msg = document.getElementById('msg');

  // If we already have a session, jump straight to the dashboard.
  fetch('/api/auth/me').then(r => { if (r.ok) location.replace('/'); });

  form.addEventListener('submit', async (ev) => {
    ev.preventDefault();
    const email = emailEl.value.trim().toLowerCase();
    msg.className = 'msg';
    msg.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Sending…';
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      if (!r.ok) {
        const body = await r.json().catch(() => ({}));
        throw new Error(body.error || `HTTP ${r.status}`);
      }
      msg.className = 'msg ok';
      msg.textContent = `Check ${email} for a sign-in link.`;
    } catch (e) {
      msg.className = 'msg err';
      msg.textContent = e.message || 'Could not send. Try again.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send magic link';
    }
  });
</script>
</body>
</html>
